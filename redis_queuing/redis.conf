# =============================================================================
# Redis Configuration for Distributed Job Queue & State Store
# =============================================================================
# Purpose: Central coordination service for distributed scraping workers
# Components: Job Queue (LIST), Shared State (K/V), Token Pool
# =============================================================================

# -----------------------------------------------------------------------------
# NETWORK
# -----------------------------------------------------------------------------

# Bind to all interfaces for remote access (secure via firewall/password)
# For production: bind to private network IP only (e.g., bind 10.0.0.5)
bind 0.0.0.0

# Default Redis port
port 6379

# TCP listen backlog - increase for high connection rates
# Should match or exceed net.core.somaxconn on host
tcp-backlog 511

# Close connection after client is idle N seconds (0 = disabled)
# For long-polling workers using BRPOP, set high or disable
timeout 0

# TCP keepalive - detect dead connections (in seconds)
tcp-keepalive 300

# -----------------------------------------------------------------------------
# SECURITY
# -----------------------------------------------------------------------------

# REQUIRED: Set a strong password for production
# Generate with: openssl rand -base64 32
requirepass YOUR_STRONG_PASSWORD_HERE

# Protected mode - disable since we're using password auth
protected-mode no

# Disable dangerous commands (uncomment in production)
# These can cause data loss or performance issues
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command DEBUG ""
rename-command CONFIG "CONFIG_8f3a9b2c"
# rename-command SHUTDOWN "SHUTDOWN_secured"
# rename-command KEYS "KEYS_secured"

# ACL - Optional fine-grained access control (Redis 6+)
# Example: Create a worker user with limited permissions
# user worker on >worker_password ~jobs:* ~tokens:* ~state:* +@read +@write +@list -@admin

# -----------------------------------------------------------------------------
# MEMORY MANAGEMENT
# -----------------------------------------------------------------------------

# Maximum memory limit (adjust based on your server)
# For job queues, 1-4GB is typically sufficient
maxmemory 2gb

# Memory policy when maxmemory is reached
# noeviction: Return errors when memory limit reached (CRITICAL for queues!)
# This prevents job loss - workers will retry on error
maxmemory-policy noeviction

# Memory sampling for eviction (if using eviction policy)
maxmemory-samples 10

# -----------------------------------------------------------------------------
# PERSISTENCE - RDB SNAPSHOTS (Primary)
# -----------------------------------------------------------------------------
# RDB creates point-in-time snapshots. Good balance of performance/durability.
# Risk: Up to N seconds of data loss on crash (based on save intervals)

# Enable RDB persistence
# Format: save <seconds> <changes>
# Snapshot if at least 1 key changed in 900 seconds (15 min)
save 900 1
# Snapshot if at least 10 keys changed in 300 seconds (5 min)
save 300 10
# Snapshot if at least 100 keys changed in 60 seconds (1 min)  
save 60 100
# For high-frequency queues, add more aggressive snapshot:
save 30 1000

# Stop accepting writes if RDB save fails (data safety)
stop-writes-on-bgsave-error yes

# Compress RDB files (CPU trade-off for disk space)
rdbcompression yes

# RDB checksum for corruption detection
rdbchecksum yes

# RDB filename
dbfilename dump.rdb

# Directory for RDB and AOF files
dir /data

# -----------------------------------------------------------------------------
# PERSISTENCE - AOF (Append Only File) - RECOMMENDED FOR QUEUES
# -----------------------------------------------------------------------------
# AOF logs every write operation. Better durability than RDB alone.
# Enable this if you cannot afford ANY job loss on restart.

# Enable AOF persistence (recommended for job queues)
appendonly yes

# AOF filename
appendfilename "appendonly.aof"

# AOF fsync policy:
# - always: fsync after every write (safest, slowest)
# - everysec: fsync every second (good balance) ← RECOMMENDED
# - no: let OS decide (fastest, least safe)
appendfsync everysec

# Don't fsync during BGSAVE/BGREWRITEAOF (reduces I/O spikes)
no-appendfsync-on-rewrite no

# Auto-rewrite AOF when it grows by this percentage
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Load truncated AOF on startup (safer recovery)
aof-load-truncated yes

# Enable RDB-AOF hybrid format (Redis 4.0+)
# Faster restarts with AOF durability
aof-use-rdb-preamble yes

# -----------------------------------------------------------------------------
# PERFORMANCE TUNING
# -----------------------------------------------------------------------------

# Number of databases (default 16, usually only need a few)
databases 4

# Lazy freeing - offload memory reclamation to background threads
# Prevents latency spikes when deleting large keys
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
replica-lazy-flush yes

# Client output buffer limits
# For pub/sub (if using for notifications)
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Disable Lua script timeout for long operations (adjust if using scripts)
lua-time-limit 5000

# -----------------------------------------------------------------------------
# LOGGING
# -----------------------------------------------------------------------------

# Log level: debug, verbose, notice, warning
loglevel notice

# Log to stdout (Docker captures this) or specify file path
logfile ""

# Slow query log (queries taking longer than N microseconds)
slowlog-log-slower-than 10000
slowlog-max-len 128

# -----------------------------------------------------------------------------
# ADVANCED (usually leave defaults)
# -----------------------------------------------------------------------------

# Hash optimization for small hashes
hash-max-ziplist-entries 512
hash-max-ziplist-value 64

# List optimization
list-max-ziplist-size -2
list-compress-depth 0

# Set optimization
set-max-intset-entries 512

# Sorted set optimization
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# Active rehashing for faster hash table operations
activerehashing yes

# HyperLogLog sparse representation
hll-sparse-max-bytes 3000

# Stream optimization
stream-node-max-bytes 4096
stream-node-max-entries 100

# Active defragmentation (Redis 4.0+)
activedefrag no

# I/O threads (Redis 6.0+) - enable for high throughput
# io-threads 4
# io-threads-do-reads yes
